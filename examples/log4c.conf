# 日志目录。会自动创建。
log_dir=logs

# 日志文件名。
file_name=app.log

# 最低日志级别：trace/debug/info/warn/error/fatal/off
level=debug

# 单个日志文件最大字节数。0 表示不滚动。
rotation_max_bytes=1048576

# 最多保留几个历史文件。0 表示不滚动。
rotation_max_files=3

# 是否输出到控制台。
console=true

# 是否输出到文件。
file=true

# 是否启用颜色。建议只在控制台开启。
color=false

# 是否输出时间戳。
timestamp=true

# 是否输出源码位置。
location=true

# 是否每条日志后立即 flush。
auto_flush=true

# 控制台输出流：stderr 或 stdout
console_stream=stderr
